<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery – 5 per page</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #1e293b;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            margin-top: 0;
            color: #38bdf8;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .card {
            background: #0f172a;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .card .info {
            padding: 10px;
            font-size: 12px;
            color: #94a3b8;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
        }

        button {
            background: #38bdf8;
            border: none;
            color: #0f172a;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button:hover:not(:disabled) {
            background: #0ea5e9;
        }

        .loader {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logout-btn {
            background: #ef4444;
            color: white;
        }

        .login-prompt {
            text-align: center;
            padding: 40px;
        }
    </style>
</head>

<body>
    <div class="container" id="app">
        <div class="header">
            <h1>📸 Cultural Image Gallery</h1>
            <button id="logoutBtn" class="logout-btn" style="display:none;">Logout</button>
        </div>
        <div class="gallery" id="gallery">
            <div class="loader">Checking authentication...</div>
        </div>
        <div class="pagination" id="pagination" style="display:none;">
            <button id="prevBtn" disabled>← Previous</button>
            <span id="pageIndicator" style="line-height: 36px;">Page 1</span>
            <button id="nextBtn">Next →</button>
        </div>
    </div>

    <script>
        const supabaseUrl = "https://vjcumvumnnvgncnbbtzk.supabase.co";
        const supabaseAnonKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqY3VtdnVtbm52Z25jbmJidHprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5MjQwOTMsImV4cCI6MjA4MzUwMDA5M30.6YtPHl9EXnRNDtdUIMkNbLLyUvuk9hG3k1gHjn14qd4";
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
        let currentUser = null;
        let currentPage = 1;
        let hasPrev = false;
        let hasNext = false;

        async function checkAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) {
                document.getElementById('gallery').innerHTML = `<div class="login-prompt">You are not logged in. <a href="/">Sign in</a></div>`;
                document.getElementById('pagination').style.display = 'none';
                document.getElementById('logoutBtn').style.display = 'none';
                return false;
            }
            currentUser = session.user;
            document.getElementById('logoutBtn').style.display = 'block';
            return true;
        }

        async function getToken() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session) throw new Error("Not authenticated");
            return session.access_token;
        }

        async function loadGallery(page = 1) {
            const galleryDiv = document.getElementById('gallery');
            galleryDiv.innerHTML = '<div class="loader">Loading images...</div>';
            try {
                const token = await getToken();
                const resp = await fetch(`/api/gallery/images?page=${page}&per_page=5`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                if (!resp.ok) {
                    if (resp.status === 401) throw new Error("Session expired. Please reload.");
                    throw new Error(await resp.text());
                }
                const data = await resp.json();
                hasPrev = data.has_prev;
                hasNext = data.has_next;
                currentPage = data.page;
                document.getElementById('prevBtn').disabled = !hasPrev;
                document.getElementById('nextBtn').disabled = !hasNext;
                document.getElementById('pageIndicator').innerText = `Page ${currentPage}`;
                document.getElementById('pagination').style.display = 'flex';

                if (data.images.length === 0) {
                    galleryDiv.innerHTML = '<div class="loader">No images found. Please scan or upload images first.</div>';
                    return;
                }
                galleryDiv.innerHTML = '';
                for (const img of data.images) {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                    <img src="${img.image_url}" loading="lazy" onerror="this.src='https://placehold.co/400x300?text=Failed+to+load'">
                    <div class="info">
                        📍 ${img.country_code || '?'} / ${img.folder || '?'}<br>
                        ${img.description ? img.description.substring(0, 80) + '…' : 'No description'}
                    </div>
                `;
                    galleryDiv.appendChild(card);
                }
            } catch (err) {
                galleryDiv.innerHTML = `<div class="loader">Error: ${err.message}</div>`;
            }
        }

        document.getElementById('nextBtn').onclick = () => {
            if (hasNext) loadGallery(currentPage + 1);
        };
        document.getElementById('prevBtn').onclick = () => {
            if (hasPrev) loadGallery(currentPage - 1);
        };
        document.getElementById('logoutBtn').onclick = async () => {
            await supabase.auth.signOut();
            window.location.href = '/';
        };

        (async () => {
            const loggedIn = await checkAuth();
            if (loggedIn) {
                loadGallery(1);
            }
        })();
    </script>
</body>

</html>
